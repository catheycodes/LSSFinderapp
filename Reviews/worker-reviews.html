  worker-dashboard.html-ல இந்த section add பண்ணு
  requestsSection div-க்கு கீழே paste பண்ணு

<!-- RECEIVED REVIEWS SECTION -->
<div class="requests-section" id="reviewsSection" style="display:none;">
  <div class="section-header">
    <h2>⭐ My Reviews <span id="rvBadge" class="new-badge" style="display:none;background:#f59e0b">0</span></h2>
    <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;">
      <div style="display:flex;gap:.4rem;flex-wrap:wrap;" id="rvFilters">
        <button class="filter-tab active" onclick="filterRv('all',this)">All</button>
        <button class="filter-tab" onclick="filterRv('5',this)">★★★★★</button>
        <button class="filter-tab" onclick="filterRv('4',this)">★★★★</button>
        <button class="filter-tab" onclick="filterRv('3',this)">★★★</button>
      </div>
    </div>
  </div>
  <!-- Rating summary strip -->
  <div id="rvSummaryStrip" style="padding:1.25rem 1.75rem;border-bottom:1px solid #eee;display:none;">
    <div style="display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;">
      <div style="text-align:center;">
        <div style="font-size:2.5rem;font-weight:700;line-height:1" id="rvAvgBig">—</div>
        <div id="rvStarsBig" style="margin:4px 0;display:flex;gap:2px;justify-content:center;"></div>
        <div style="font-size:12px;color:#888" id="rvTotalLbl">0 reviews</div>
      </div>
      <div style="flex:1;min-width:140px;" id="rvBarsWrap"></div>
    </div>
  </div>
  <div id="rvContainer"></div>
</div>
