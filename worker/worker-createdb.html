<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Profile - Local Skill Finder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 2rem; }

        .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }

        /* ── Loading ── */
        .loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5rem 2rem; gap: 1rem; }
        .spinner { width: 52px; height: 52px; border: 5px solid #e0e0e0; border-top-color: #667eea; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: #667eea; font-weight: 600; }

        /* ── Header ── */
        .profile-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 2.5rem 2rem 2rem; text-align: center; }
        .welcome-badge { display: inline-block; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); border-radius: 20px; padding: 0.35rem 1rem; font-size: 0.85rem; margin-bottom: 1.25rem; }

        /* DB badge */
        .db-source-badge { display: inline-flex; align-items: center; gap: 0.4rem; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 20px; padding: 0.25rem 0.85rem; font-size: 0.78rem; margin-bottom: 1rem; }

        .avatar-wrap { position: relative; width: 100px; height: 100px; margin: 0 auto 1rem; }
        .avatar-circle { width: 100%; height: 100%; border-radius: 50%; background: white; color: #667eea; display: flex; align-items: center; justify-content: center; font-size: 2.6rem; font-weight: 700; box-shadow: 0 5px 20px rgba(0,0,0,0.25); border: 3px solid rgba(255,255,255,0.6); overflow: hidden; }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; display: none; border-radius: 50%; }
        .avatar-circle.has-photo span { display: none; }
        .avatar-circle.has-photo img  { display: block; }

        .profile-header h1 { font-size: 1.8rem; margin-bottom: 0.3rem; }
        .category-tag { display: inline-block; background: rgba(255,255,255,0.25); border-radius: 20px; padding: 0.3rem 1rem; font-size: 0.95rem; margin-top: 0.5rem; }

        .stats-bar { display: flex; justify-content: center; gap: 2.5rem; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid rgba(255,255,255,0.2); flex-wrap: wrap; }
        .stat { text-align: center; }
        .stat-val { font-size: 1.35rem; font-weight: 700; }
        .stat-lbl { font-size: 0.78rem; opacity: 0.8; margin-top: 2px; }

        /* ── Body ── */
        .profile-body { padding: 2rem; }
        .section { margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px solid #f0f0f0; }
        .section:last-of-type { border-bottom: none; margin-bottom: 0; }
        .section-title { font-size: 1rem; font-weight: 700; color: #333; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.4rem; }

        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0.75rem; }
        .info-card { background: #f8f9fa; border-radius: 10px; padding: 0.85rem 1rem; border-left: 3px solid #667eea; }
        .info-card .label { font-size: 0.72rem; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.3rem; }
        .info-card .value { font-size: 0.95rem; font-weight: 600; color: #333; word-break: break-word; }

        .price-card { background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%); border: 2px solid #667eea55; border-radius: 12px; padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
        .price-card .price-label { font-size: 0.8rem; color: #667eea; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 0.3rem; }
        .price-card .price-value { font-size: 1.3rem; font-weight: 800; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .price-divider { color: #ccc; font-size: 1.5rem; }

        .skills-wrap { display: flex; flex-wrap: wrap; gap: 0.6rem; }
        .skill-badge { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 0.4rem 1.1rem; border-radius: 20px; font-size: 0.85rem; font-weight: 500; }

        .desc-box { background: #f8f9fa; border-radius: 10px; padding: 1rem; color: #555; line-height: 1.75; font-size: 0.95rem; }

        .days-display { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .day-chip { padding: 0.4rem 0.9rem; border-radius: 8px; font-size: 0.83rem; font-weight: 600; }
        .day-chip.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; box-shadow: 0 2px 8px rgba(102,126,234,0.35); }
        .day-chip.inactive { background: #f0f0f0; color: #ccc; text-decoration: line-through; }

        .hours-pill { display: inline-flex; align-items: center; gap: 0.5rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 0.5rem 1.25rem; border-radius: 25px; font-size: 0.9rem; font-weight: 600; margin-top: 0.75rem; }

        /* Member since */
        .joined-badge { display: inline-flex; align-items: center; gap: 0.4rem; background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; border-radius: 20px; padding: 0.3rem 0.85rem; font-size: 0.82rem; font-weight: 600; margin-top: 0.5rem; }

        .images-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.75rem; }
        .img-wrap { position: relative; border-radius: 10px; overflow: hidden; aspect-ratio: 1; cursor: pointer; border: 2px solid #e0e0e0; transition: transform 0.2s, box-shadow 0.2s; }
        .img-wrap:hover { transform: scale(1.03); box-shadow: 0 6px 20px rgba(102,126,234,0.3); }
        .img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .img-overlay { position: absolute; inset: 0; background: rgba(102,126,234,0.55); color: white; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; }
        .img-wrap:hover .img-overlay { opacity: 1; }

        /* Lightbox */
        .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 9999; align-items: center; justify-content: center; padding: 2rem; }
        .lightbox.open { display: flex; }
        .lightbox img { max-width: 90vw; max-height: 85vh; border-radius: 12px; object-fit: contain; box-shadow: 0 10px 50px rgba(0,0,0,0.5); }
        .lb-close { position: absolute; top: 1.2rem; right: 1.5rem; color: white; font-size: 2rem; cursor: pointer; opacity: 0.8; }
        .lb-close:hover { opacity: 1; }

        .actions { display: flex; gap: 1rem; margin-top: 2rem; }
        .btn { flex: 1; padding: 0.9rem; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.3s; font-family: inherit; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
        .btn-secondary { background: white; color: #667eea; border: 2px solid #667eea; }
        .btn-secondary:hover { background: #f8f9fa; }

        .no-data { text-align: center; color: #888; padding: 3rem; font-size: 1rem; }

        @media (max-width: 600px) {
            body { padding: 0; }
            .container { border-radius: 0; }
            .stats-bar { gap: 1.25rem; }
            .actions { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Loading -->
    <div id="loadingWrap" class="loading-wrap">
        <div class="spinner"></div>
        <div class="loading-text">Loading your profile from database...</div>
    </div>

    <!-- Profile (hidden until loaded) -->
    <div id="profileWrap" style="display:none;">

        <!-- Header -->
        <div class="profile-header">
            <div class="welcome-badge">✅ Profile Created Successfully</div>
            <div class="db-source-badge" id="dbSourceBadge">🗄️ Loaded from Database</div>
            <div class="avatar-wrap">
                <div class="avatar-circle" id="avatarCircle">
                    <span id="avatarInitial">?</span>
                    <img id="avatarPhoto" src="" alt="Profile Photo">
                </div>
            </div>
            <h1 id="headerName">Worker Name</h1>
            <div class="category-tag" id="headerCategory">Category</div>
            <div id="joinedBadge" class="joined-badge" style="display:none;"></div>
            <div class="stats-bar">
                <div class="stat"><div class="stat-val" id="statExp">0</div><div class="stat-lbl">Yrs Experience</div></div>
                <div class="stat"><div class="stat-val" id="statDays">0</div><div class="stat-lbl">Days Available</div></div>
                <div class="stat"><div class="stat-val" id="statSkills">0</div><div class="stat-lbl">Skills Listed</div></div>
                <div class="stat"><div class="stat-val" id="statPrice">₹0</div><div class="stat-lbl">Min Price</div></div>
            </div>
        </div>

        <!-- Body -->
        <div class="profile-body" id="profileBody"></div>
    </div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <span class="lb-close">✕</span>
    <img id="lbImg" src="" alt="">
</div>

<script>
    const API_URL  = 'https://lssfinderapp-backend-3.onrender.com/api';
    const ALL_DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
    let _allImages = [];

    function fmtTime(t) {
        if (!t) return '';
        const [h, m] = t.split(':').map(Number);
        return `${h % 12 || 12}:${String(m).padStart(2,'0')} ${h >= 12 ? 'PM' : 'AM'}`;
    }

    function openLightbox(i) {
        document.getElementById('lbImg').src = _allImages[i];
        document.getElementById('lightbox').classList.add('open');
    }
    function closeLightbox() {
        document.getElementById('lightbox').classList.remove('open');
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    /* ================================================
       ON LOAD — Fetch from DB first, fallback localStorage
    ================================================ */
    window.addEventListener('load', async function () {
        const token = localStorage.getItem('token');
        const local = (() => { try { return JSON.parse(localStorage.getItem('user') || '{}'); } catch(e) { return {}; } })();

        let workerData = null;
        let fromDB     = false;

        // Try DB fetch
        if (token) {
            try {
                const res  = await fetch(`${API_URL}/worker/profile`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                if (data.success && data.worker) {
                    workerData = data.worker;
                    fromDB     = true;
                }
            } catch(err) {
                console.warn('Server not reachable, using localStorage');
            }
        }

        // Fallback to localStorage
        if (!workerData) {
            const reg = (() => { try { return JSON.parse(localStorage.getItem('workerRegistration') || '{}'); } catch(e) { return {}; } })();
            workerData = (reg && reg.role === 'worker') ? reg : local;
        }

        // Hide loading, show profile
        document.getElementById('loadingWrap').style.display  = 'none';
        document.getElementById('profileWrap').style.display  = 'block';

        if (!workerData || (!workerData.full_name && !workerData.name)) {
            document.getElementById('profileBody').innerHTML = `
                <div class="no-data">
                    <p>⚠️ No worker data found.</p>
                    <p style="margin-top:1rem;font-size:0.9rem;">
                        Please complete <a href="../register.html?type=worker" style="color:#667eea">Worker Registration</a> first.
                    </p>
                </div>`;
            return;
        }

        renderProfile(workerData, fromDB);
    });

    /* ================================================
       RENDER PROFILE
    ================================================ */
    function renderProfile(d, fromDB) {
        const name     = d.full_name || d.name || 'Worker';
        const initial  = name.charAt(0).toUpperCase();

        // ── DB source badge ──
        const badge = document.getElementById('dbSourceBadge');
        if (fromDB) {
            badge.innerHTML = '🗄️ Loaded from Database';
            badge.style.background = 'rgba(255,255,255,0.2)';
        } else {
            badge.innerHTML = '⚠️ Showing locally saved data';
            badge.style.background = 'rgba(255,200,0,0.25)';
        }

        // ── Avatar ──
        document.getElementById('avatarInitial').textContent = initial;
        const photo = d.profile_photo || d.profilePhoto || '';
        if (photo) {
            document.getElementById('avatarPhoto').src = photo;
            document.getElementById('avatarCircle').classList.add('has-photo');
        }

        // ── Header ──
        document.getElementById('headerName').textContent     = name;
        document.getElementById('headerCategory').textContent = '🔧 ' + (d.category || 'Professional');

        // ── Member Since ──
        if (d.created_at) {
            const fmt = new Date(d.created_at).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
            const jb  = document.getElementById('joinedBadge');
            jb.textContent   = '📅 Member since ' + fmt;
            jb.style.display = 'inline-flex';
        }

        // ── Skills ──
        const skillsList = Array.isArray(d.skills)
            ? d.skills
            : (d.skills ? d.skills.split(',').map(s => s.trim()).filter(Boolean) : []);

        // ── Availability ──
        const availDays = Array.isArray(d.availability)
            ? d.availability
            : (d.availability ? d.availability.split(',') : []);

        // ── Work Images ──
        _allImages = d.work_images || d.workImages || [];

        // ── Prices ──
        const minP = d.min_price != null ? d.min_price : (d.minPrice != null ? d.minPrice : null);
        const maxP = d.max_price != null ? d.max_price : (d.maxPrice != null ? d.maxPrice : null);

        // ── Working Hours ──
        const st = d.start_time || d.startTime || '';
        const et = d.end_time   || d.endTime   || '';
        const workingHours = d.workingHours || (st && et ? fmtTime(st) + ' – ' + fmtTime(et) : 'Not set');

        // ── Stats ──
        document.getElementById('statExp').textContent    = d.experience || '0';
        document.getElementById('statDays').textContent   = availDays.length;
        document.getElementById('statSkills').textContent = skillsList.length;
        document.getElementById('statPrice').textContent  = minP != null ? `₹${Number(minP).toLocaleString('en-IN')}` : '—';

        // ── Price HTML ──
        const priceHTML = (minP != null && maxP != null)
            ? `<div class="price-card">
                <div><div class="price-label">Minimum Charge</div><div class="price-value">₹${Number(minP).toLocaleString('en-IN')}</div></div>
                <div class="price-divider">—</div>
                <div><div class="price-label">Maximum Charge</div><div class="price-value">₹${Number(maxP).toLocaleString('en-IN')}</div></div>
               </div>`
            : `<div style="color:#aaa;font-size:0.9rem;">No price set.</div>`;

        // ── Images HTML ──
        const imagesHTML = _allImages.length > 0
            ? `<div class="images-grid">
                ${_allImages.map((src, i) => `
                    <div class="img-wrap" onclick="openLightbox(${i})">
                        <img src="${src}" alt="Work ${i+1}">
                        <div class="img-overlay">🔍</div>
                    </div>`).join('')}
               </div>`
            : `<div style="color:#aaa;font-size:0.9rem;">No work images uploaded.</div>`;

        // ── Render Body ──
        document.getElementById('profileBody').innerHTML = `

            <!-- Personal Info -->
            <div class="section">
                <div class="section-title">👤 Personal Information</div>
                <div class="info-grid">
                    <div class="info-card"><div class="label">Full Name</div><div class="value">${esc(name)}</div></div>
                    <div class="info-card"><div class="label">Phone</div><div class="value">${esc(d.phone || '—')}</div></div>
                    <div class="info-card"><div class="label">Email</div><div class="value">${esc(d.email || '—')}</div></div>
                </div>
            </div>

            <!-- Location -->
            <div class="section">
                <div class="section-title">📍 Location</div>
                <div class="info-grid">
                    <div class="info-card"><div class="label">Address</div><div class="value">${esc(d.address || '—')}</div></div>
                    <div class="info-card"><div class="label">City</div><div class="value">${esc(d.city || '—')}</div></div>
                    <div class="info-card"><div class="label">Pincode</div><div class="value">${esc(d.pincode || '—')}</div></div>
                </div>
            </div>

            <!-- Professional -->
            <div class="section">
                <div class="section-title">💼 Professional Details</div>
                <div class="info-grid" style="margin-bottom:1rem;">
                    <div class="info-card"><div class="label">Service Category</div><div class="value">${esc(d.category || '—')}</div></div>
                    <div class="info-card"><div class="label">Years of Experience</div><div class="value">${esc(d.experience || '—')} yrs</div></div>
                </div>
                <div class="section-title" style="font-size:0.9rem;margin-bottom:0.5rem;">🛠️ Skills</div>
                <div class="skills-wrap">
                    ${skillsList.length > 0
                        ? skillsList.map(s => `<span class="skill-badge">${esc(s)}</span>`).join('')
                        : '<span style="color:#aaa;font-size:0.9rem;">No skills listed</span>'}
                </div>
            </div>

            <!-- Price Range -->
            <div class="section">
                <div class="section-title">💰 Service Price Range</div>
                ${priceHTML}
            </div>

            <!-- Work Images -->
            <div class="section">
                <div class="section-title">🖼️ Work Images</div>
                ${imagesHTML}
            </div>

            <!-- About -->
            <div class="section">
                <div class="section-title">📝 About</div>
                <div class="desc-box">${esc(d.description || 'No description provided.')}</div>
            </div>

            <!-- Availability -->
            <div class="section">
                <div class="section-title">🗓️ Availability</div>
                <div class="days-display">
                    ${ALL_DAYS.map(day => {
                        const on = availDays.includes(day);
                        return `<span class="day-chip ${on ? 'active' : 'inactive'}">${day}</span>`;
                    }).join('')}
                </div>
                <div class="hours-pill">🕐 Working Hours: ${esc(workingHours)}</div>
            </div>

            <!-- Member Since (if from DB) -->
            ${d.created_at ? `
            <div class="section">
                <div class="section-title">📅 Account Info</div>
                <div class="info-grid">
                    <div class="info-card"><div class="label">Member Since</div>
                        <div class="value">${new Date(d.created_at).toLocaleDateString('en-IN', {day:'numeric',month:'long',year:'numeric'})}</div>
                    </div>
                    <div class="info-card"><div class="label">Account ID</div><div class="value">#${d.id || '—'}</div></div>
                </div>
            </div>` : ''}

            <!-- Actions -->
            <div class="actions">
                <button class="btn btn-secondary" onclick="window.location.href='worker-profile-edit.html'">✏️ Edit Profile</button>
                <button class="btn btn-primary"   onclick="window.location.href='worker-dashboard.html'">Go to Dashboard →</button>
            </div>
        `;
    }

    function esc(v) {
        return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
</script>
</body>
</html>
